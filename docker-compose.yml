services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: probrand
      POSTGRES_PASSWORD: probrand
      POSTGRES_DB: probrand_erp
    ports:
      - "5432:5432"
    volumes:
      - probrand_pgdata:/var/lib/postgresql/data

volumes:
  probrand_pgdata:
